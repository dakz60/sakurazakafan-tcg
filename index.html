<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>櫻坂TCG◢ デッキ管理</title>
<style>
body { font-family:sans-serif; background:white; color: rgb(241,157,181); margin:0; padding:20px; font-size:16px; }
h1,h2 { text-align:center; color: rgb(241,157,181); }
button.tab { background: rgb(241,157,181); color:white; border:none; padding:10px 20px; margin-right:5px; cursor:pointer; border-radius:5px; }
button.tab.active { background:white; color: rgb(241,157,181); border:1px solid rgb(241,157,181); }
.tab-content { display:none; margin-top:20px; }
.tab-content.active { display:block; }

input, select, button, textarea { margin:5px; padding:6px; border-radius:5px; border:1px solid rgb(241,157,181); font-size:16px; color:black; }
button { cursor:pointer; }
button:hover { background:white; color:rgb(241,157,181); }
textarea { width:100%; resize:none; }
hr { border:1px solid rgb(241,157,181); }

.card-white { color: rgb(241,157,181); background-color: rgba(241,157,181,0.1); padding:10px; margin:6px 0; border-radius:10px; }
.card-red { color:white; background-color: rgba(241,157,181,0.6); padding:10px; margin:6px 0; border-radius:10px; }
.card-blue { color:white; background-color: rgba(68,170,255,0.4); padding:10px; margin:6px 0; border-radius:10px; }
.card-black { color:white; background-color: rgba(0,0,0,0.4); padding:10px; margin:6px 0; border-radius:10px; }

.flex-row { display:flex; gap:40px; align-items:flex-start; }
.flex-col { display:flex; flex-direction:column; }

#deckContainer { display:flex; gap:20px; align-items:flex-start; margin-top:20px; padding:20px; border-radius:20px; box-shadow:0 8px 20px rgba(0,0,0,0.2); min-height:700px; }
#deckContainer.white-mode { background:white; }
#deckContainer.mat-mode { background-image:url("images/plm.jpg"); background-size:cover; background-position:center; }

#deckImages { display:grid; grid-template-columns:repeat(10,98px); grid-template-rows:repeat(5,140px); gap:1px; justify-items:center; align-items:center; }
#deckImages img { width:98px; height:140px; border-radius:5px; border:1px solid #ccc; cursor:grab; object-fit:cover; }
#territoryImage img { width:270px; height:180px; border-radius:5px; border:1px solid #ccc; display:block; margin:auto; }

#releaseCountdown, #deckCheckResult, #deckCodeResult { text-align:center; font-weight:bold; margin:10px 0; }
#deckCheckResult { color: rgb(241,50,50); }
.search-section { margin-bottom:10px; }
#result { max-height:500px; overflow-y:auto; }

#recipePreview { display:flex; flex-wrap:wrap; gap:4px; margin-top:10px; justify-content:center; }
#recipePreview img { width:70px; height:100px; object-fit:cover; border-radius:4px; border:1px solid #ccc; }
</style>
</head>
<body>

<h1>櫻坂TCG◢ デッキ管理</h1>

<!-- タブ -->
<div>
  <button class="tab active" onclick="openTab('deck')">デッキ作成</button>
  <button class="tab" onclick="openTab('recipe')">デッキレシピ投稿</button>
</div>

<!-- デッキ作成タブ -->
<div id="deck" class="tab-content active">
  <h2>デッキ作成</h2>
  <div id="releaseCountdown"></div>

  <div class="flex-row">
    <!-- 左：検索 -->
    <div style="flex:2;" class="flex-col">
      <div class="search-section">
        <label>カード名:<input type="text" id="searchBox" placeholder="カード名" list="cardList"><datalist id="cardList"></datalist></label>
        <label>効果:<input type="text" id="effectSearchBox" placeholder="効果検索"></label>
        <button onclick="search()">検索</button>
      </div>
      <div class="search-section">
        <label>タイプ<select id="typeFilter"><option value="">すべて</option><option value="unit">ユニット</option><option value="command">コマンド</option><option value="territory">テリトリー</option></select></label>
        <label>色<select id="colorFilter"><option value="">すべて</option><option value="白">白</option><option value="赤">赤</option><option value="青">青</option><option value="黒">黒</option></select></label>
      </div>
    </div>

    <!-- 右：ランダムカード -->
    <div style="flex:1; border:2px solid rgb(241,157,181); border-radius:80px; padding:20px;">
      <h3 style="text-align:center;">🌸ランダムカード🌸</h3>
      <div id="dailyCard"></div>
      <div style="text-align:center; margin-top:10px;">
        <button onclick="rerollDailyCard()">🌸</button>
        <input type="text" id="manualCardId" placeholder="カードID" style="width:60px;">
        <button onclick="showManualCard()">表示</button>
      </div>
    </div>
  </div>

  <!-- 検索結果＆デッキ状況 -->
  <div class="flex-row">
    <div style="flex:2;"><h2>検索結果</h2><div id="result"></div></div>
    <div style="flex:1;"><h3>デッキ状況</h3><div id="deckStatus"></div></div>
  </div>

  <hr>

  <!-- デッキ画像 -->
  <div id="deckContainer" class="white-mode">
    <div id="deckImages"></div>
    <div id="territoryImage"></div>
  </div>
  <button onclick="checkDeckRules()">完成チェック</button>
  <button onclick="toggleBackground()">背景切替</button>
  <div id="deckCheckResult"></div>

  <h2>デッキコード</h2>
  <textarea id="deckCodeBox" placeholder="ここにデッキコードを入力"></textarea><br>
  <button onclick="generateDeckCode()">生成</button>
  <button onclick="loadDeckFromCode()">復元</button>
  <button onclick="copyDeckCode()">コピー</button>
  <div id="deckCodeResult"></div>
</div>

<!-- デッキレシピ投稿タブ -->
<div id="recipe" class="tab-content">
  <h2>デッキレシピ投稿</h2>
  <form>
    <label>タイトル:<br><input type="text" id="recipeTitle" style="width:100%"></label><br><br>
    <label>説明:<br><textarea id="recipeDesc" style="width:100%; height:100px;"></textarea></label><br><br>
    <h3>デッキプレビュー</h3>
    <div id="recipePreview"></div>
    <button type="button" onclick="postToTwitter()">Twitterに投稿</button>
  </form>
</div>

<script src="data/cards.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
<script>
// --- タブ ---
function openTab(tabId){
  document.querySelectorAll('button.tab').forEach(b=>b.classList.remove('active'));
  event.currentTarget.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
}

// --- デッキ管理 ---
let deck=[], territoryCardId=null;
updateReleaseCountdown();
function updateReleaseCountdown(){
  const releaseDate = new Date("2026-03-20");
  const diff=Math.ceil((releaseDate-new Date())/(1000*60*60*24));
  document.getElementById("releaseCountdown").textContent=diff>0?`発売まであと${diff}日`:"発売日です！";
}

// ランダムカード
function showDailyCard(){ if(!cards||!cards.length)return; const c=cards[Math.floor(Math.random()*cards.length)]; document.getElementById("dailyCard").innerHTML=`<img src="${c.img}" style="width:240px;margin:auto;display:block;"><div style="text-align:center;margin-top:10px;">${c.name}</div>`; }
function rerollDailyCard(){ showDailyCard(); }
function showManualCard(){ const id=document.getElementById("manualCardId").value.trim(); const c=cards.find(x=>x.id===id); if(c){ document.getElementById("dailyCard").innerHTML=`<img src="${c.img}" style="width:240px;margin:auto;display:block;"><div style="text-align:center;margin-top:10px;">${c.name}</div>`; }else alert("カードIDが見つかりません"); }
showDailyCard();

// デッキ操作
function addToDeck(id){ const c=cards.find(x=>x.id===id); if(!c) return; if(c.type==="territory"){territoryCardId=id; updateDeckImages(); updateDeckStatus(); updateRecipePreview(); return;} 
const same=deck.filter(d=>{const x=cards.find(c=>c.id===d); if(!x)return false; return x.name===c.name&&x.type===c.type&&x.cost===c.cost&&x.power===c.power&&x.hit===c.hit&&x.color===c.color&&JSON.stringify(x.subType||[])===JSON.stringify(c.subType||[])&&x.generation===c.generation;}).length;
if(same>=4){alert("同じカードは4枚まで"); return;} if(deck.length>=50){alert("デッキは50枚まで"); return;} deck.push(id); updateDeckImages(); updateDeckStatus(); updateRecipePreview(); }
function removeFromDeck(id){ const i=deck.indexOf(id); if(i!==-1) deck.splice(i,1); if(territoryCardId===id) territoryCardId=null; updateDeckImages(); updateDeckStatus(); updateRecipePreview(); }
function updateDeckImages(){ const div=document.getElementById("deckImages"); div.innerHTML=""; deck.slice(0,50).forEach(id=>{ const c=cards.find(x=>x.id===id); if(!c) return; const img=document.createElement("img"); img.src=c.img; img.alt=c.name; img.onclick=()=>removeFromDeck(c.id); div.appendChild(img); }); for(let i=deck.length;i<50;i++){ const ph=document.createElement("div"); ph.style.width="110px"; ph.style.height="152px"; div.appendChild(ph); } const terrDiv=document.getElementById("territoryImage"); terrDiv.innerHTML=""; if(territoryCardId){ const c=cards.find(x=>x.id===territoryCardId); if(c){ const img=document.createElement("img"); img.src=c.img; img.alt=c.name; img.onclick=()=>{territoryCardId=null; updateDeckImages(); updateDeckStatus(); updateRecipePreview();}; terrDiv.appendChild(img); }}}
function updateDeckStatus(){ let u=0,c=0,b=0,s=0; deck.forEach(id=>{ const x=cards.find(c=>c.id===id); if(!x)return; if(x.type.includes("unit")) u++; if(x.type==="command") c++; if(x.subType?.includes("バスター")) b++; if(x.subType?.includes("ショット")) s++; }); document.getElementById("deckStatus").innerHTML=`ユニット：${u}枚<br>コマンド：${c}枚<br>バスター：${b}枚<br>ショット：${s}枚<br>テリトリー：${territoryCardId?"あり":"なし"}`;}
function checkDeckRules(){ let t=deck.length, terr=territoryCardId?1:0,b=0,s=0; deck.forEach(id=>{ const c=cards.find(x=>x.id===id); if(c?.subType?.includes("バスター")) b++; if(c?.subType?.includes("ショット")) s++; }); let msg=""; if(t<40||t>50) msg+=`デッキ枚数は40～50枚（${t}枚）<br>`; if(terr!==1) msg+=`テリトリーカードは1枚必要（${terr}枚）<br>`; if(b!==12) msg+=`バスターは12枚（${b}枚）<br>`; if(s>12) msg+=`ショットは最大12枚（${s}枚）<br>`; document.getElementById("deckCheckResult").innerHTML=msg||"咲け、咲け、櫻坂46";}
Sortable.create(document.getElementById('deckImages'),{animation:150,onEnd:function(evt){const m=deck.splice(evt.oldIndex,1)[0];deck.splice(evt.newIndex,0,m); updateRecipePreview(); }});

// デッキコード
function generateDeckCode(){ if(deck.length===0){alert("デッキが空"); return;} const ids=deck.join(","), tid=territoryCardId||"0"; document.getElementById("deckCodeBox").value=tid+"|"+ids; document.getElementById("deckCodeResult").textContent="生成完了！"; }
function loadDeckFromCode(){ const code=document.getElementById("deckCodeBox").value.trim(); if(!code){alert("入力してください"); return;} try{const parts=code.split("|"); territoryCardId=parts[0]!=="0"?parts[0]:null; deck=(parts[1]?parts[1].split(","):[]).filter(id=>cards.some(c=>c.id===id)); updateDeckImages(); updateDeckStatus(); updateRecipePreview(); document.getElementById("deckCodeResult").textContent="復元完了"; }catch(e){alert("無効なコード");} }
function copyDeckCode(){ const box=document.getElementById("deckCodeBox"); if(!box.value){alert("コピーするコードなし"); return;} navigator.clipboard.writeText(box.value).then(()=>{document.getElementById("deckCodeResult").textContent="コピーしました";}).catch(()=>{alert("コピー失敗");}); }

function toggleBackground(){ const d=document.getElementById("deckContainer"); d.classList.contains("white-mode")?d.classList.replace("white-mode","mat-mode"):d.classList.replace("mat-mode","white-mode"); }

// --- 検索 ---
function search(){
  const name=document.getElementById("searchBox").value.toLowerCase(), effect=document.getElementById("effectSearchBox").value.toLowerCase();
  const result=document.getElementById("result");
  let filtered=cards.filter(c=>(!name||c.name.toLowerCase().includes(name))&&(!effect||(c.effect&&c.effect.toLowerCase().includes(effect))));
  if(filtered.length===0){ result.textContent="見つかりません"; return; }
  result.innerHTML=filtered.map(c=>{ const colorClass=c.color==="白"?"card-white":c.color==="赤"?"card-red":c.color==="青"?"card-blue":"card-black";
    const img=`<img src="${c.img}" alt="${c.name}" style="width:85px;height:auto;border-radius:5px;margin-right:5px;">`;
    const info=c.type==='command'||c.type==='territory'?`コスト:${c.cost} | 効果:${c.effect||'-'} | レア:${c.rarity||'-'} | 期:${c.generation||'-'} | トリガー:${c.subType?c.subType.join(","):'-'}`:`コスト:${c.cost} | 効果:${c.effect||'-'} | パワー:${c.power||'-'} | ヒット:${c.hit||'-'} | レア:${c.rarity||'-'} | 期:${c.generation||'-'} | トリガー:${c.subType?c.subType.join(","):'-'}`;
    return `<div class="${colorClass}" style="display:flex;align-items:center;margin-bottom:5px;">${img}<div>${c.name} | ${info}<br><button onclick="addToDeck('${c.id}')">＋</button> <button onclick="removeFromDeck('${c.id}')">－</button></div></div>`;
  }).join('');
}

// --- デッキレシピプレビュー & Twitter ---
function updateRecipePreview(){ const div=document.getElementById("recipePreview"); div.innerHTML=""; deck.forEach(id=>{ const c=cards.find(x=>x.id===id); if(c) div.innerHTML+=`<img src="${c.img}" alt="${c.name}">`; }); if(territoryCardId){ const c=cards.find(x=>x.id===territoryCardId); if(c) div.innerHTML+=`<img src="${c.img}" alt="${c.name}">`; } }

function postToTwitter(){
  const title=document.getElementById("recipeTitle").value;
  const desc=document.getElementById("recipeDesc").value;
  const code=document.getElementById("deckCodeBox").value;
  if(!title||!code){ alert("タイトルとデッキコードが必要です"); return;}
  const text=`${title}\n${desc}\nデッキコード:${code}`;
  const url="https://twitter.com/intent/tweet?text="+encodeURIComponent(text);
  window.open(url,"_blank");
}
</script>
</body>
</html>
