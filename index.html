<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>櫻坂TCG◢ デッキ管理 完全版</title>
<style>
body { font-family: sans-serif; background:white; color: rgb(241,157,181); margin:0; padding:20px; font-size:16px; }
h1, h2 { text-align:center; color: rgb(241,157,181); }
button.tab { background: rgb(241,157,181); color:white; border:none; padding:10px 20px; margin-right:5px; cursor:pointer; border-radius:5px; }
button.tab.active { background:white; color: rgb(241,157,181); border:1px solid rgb(241,157,181); }
.tab-content { display:none; margin-top:20px; }
.tab-content.active { display:block; }

input, select, button, textarea {
  margin: 5px; padding: 6px; border-radius: 5px; border:1px solid rgb(241,157,181); font-size:16px;
}
input, select, textarea { color:black; }
button { cursor:pointer; }
button:hover { background:white; color:rgb(241,157,181); }
hr { border:1px solid rgb(241,157,181); }
textarea { width: 100%; resize: none; }

.card-white { color: rgb(241,157,181); background-color: rgba(241,157,181,0.1); padding:10px; margin:6px 0; border-radius:10px; }
.card-red { color: white; background-color: rgba(241,157,181,0.6); padding:10px; margin:6px 0; border-radius:10px; }
.card-blue { color: white; background-color: rgba(68,170,255,0.4); padding:10px; margin:6px 0; border-radius:10px; }
.card-black { color: white; background-color: rgba(0,0,0,0.4); padding:10px; margin:6px 0; border-radius:10px; }

.flex-row { display:flex; gap:40px; align-items:flex-start; flex-wrap:wrap; }
.flex-col { display:flex; flex-direction:column; }

#deckContainer { display: flex; gap: 20px; align-items: flex-start; margin-top: 20px; padding: 20px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.2); min-height: 700px; flex-wrap:wrap; }
#deckContainer.white-mode { background: white; }
#deckContainer.mat-mode { background-image: url("images/plm.jpg"); background-size: cover; background-position: center; background-repeat: no-repeat; }

#deckImages { display: grid; grid-template-columns: repeat(auto-fill, 98px); grid-auto-rows: 140px; gap: 1px; justify-items: center; align-items: center; }
#deckImages img { border-radius: 5px; border: 1px solid #ccc; object-fit: cover; width: 98px; height: 140px; cursor: grab; }
#territoryImage { width: 100%; min-width:180px; }
#territoryImage img { width: 270px; height: 180px; border-radius:5px; border:1px solid #ccc; display:block; margin: 5px auto; }

#releaseCountdown, #deckCheckResult, #deckCodeResult { text-align:center; font-weight:bold; margin:10px 0; }
#deckCheckResult { color: rgb(241,50,50); }
.search-section { margin-bottom:10px; }
.search-section label { display:block; margin:2px 0; }
#result { max-height:500px; overflow-y:auto; }

#deckImageResult, #recipeDeckImage { text-align:center; margin-top:20px; }

.card-list { display:grid; grid-template-columns: repeat(auto-fill, 98px); gap:5px; justify-items:center; margin-top:10px; max-height:600px; overflow-y:auto; }
.card-list img { width:98px; height:140px; border-radius:5px; border:1px solid #ccc; cursor:pointer; }
</style>
</head>
<body>

<h1>櫻坂TCG◢ デッキ管理</h1>

<!-- タブ -->
<div>
  <button class="tab active" onclick="openTab('deck')">デッキ作成</button>
  <button class="tab" onclick="openTab('recipe')">デッキレシピ投稿</button>
  <button class="tab" onclick="openTab('allcards')">カード一覧</button>
</div>

<!-- デッキ作成タブ -->
<div id="deck" class="tab-content active">
<h2>デッキ作成</h2>
<div id="releaseCountdown"></div>

<div class="flex-row">
  <!-- 検索欄 -->
  <div style="flex:2;" class="flex-col">
    <div class="search-section">
      <label>コスト：<input type="number" id="costMin" placeholder="最小"> 〜 <input type="number" id="costMax" placeholder="最大"></label>
      <label>パワー：<input type="number" id="powerMin" placeholder="最小"> 〜 <input type="number" id="powerMax" placeholder="最大"></label>
      <label>ヒット：<input type="number" id="hitMin" placeholder="最小"> 〜 <input type="number" id="hitMax" placeholder="最大"></label>
    </div>
    <div class="search-section">
      <label>タイプ：
        <select id="typeFilter">
          <option value="">すべて</option>
          <option value="unit">ユニット</option>
          <option value="command">コマンド</option>
          <option value="territory">テリトリー</option>
        </select>
      </label>
      <label>色：
        <select id="colorFilter">
          <option value="">すべて</option>
          <option value="白">白</option>
          <option value="赤">赤</option>
          <option value="青">青</option>
          <option value="黒">黒</option>
        </select>
      </label>
      <label>期別：
        <select id="generationFilter">
          <option value="">すべて</option>
          <option value="2期">2期</option>
          <option value="3期">3期</option>
          <option value="4期">4期</option>
        </select>
      </label>
      <label>トリガー：
        <select id="subTypeFilter">
          <option value="">すべて</option>
          <option value="バスター">バスター</option>
          <option value="ショット">ショット</option>
          <option value="その他">その他</option>
        </select>
      </label>
      <label>レアリティ：
        <select id="rarityFilter">
          <option value="">すべて</option>
          <option value="PR">PR</option>
          <option value="BT">BT</option>
          <option value="LLC">LLC</option>
          <option value="R">R</option>
          <option value="R+">R+</option>
          <option value="SC">SC</option>
          <option value="N">N</option>
          <option value="N+">N+</option>
        </select>
      </label>
    </div>
    <div class="search-section">
      <label>カード名検索：
        <input type="text" id="searchBox" placeholder="カード名を入力" list="cardList">
        <datalist id="cardList"></datalist>
      </label>
      <label>効果検索：
        <input type="text" id="effectSearchBox" placeholder="効果で検索">
      </label>
      <button onclick="search()">検索</button>
    </div>
  </div>

  <!-- ランダムカード -->
  <div style="flex:1; border:2px solid rgb(241,157,181); border-radius:80px; padding:40px;">
    <h3 style="text-align:center;">🌸ランダムカード🌸</h3>
    <div id="dailyCard"></div>
    <div style="text-align:center; margin-top:10px;">
      <button onclick="rerollDailyCard()" style="font-size:16px; border-radius:20px; cursor:pointer;">🌸</button>
      <input type="text" id="manualCardId" placeholder="カードID" style="width:66px;">
      <button onclick="showManualCard()">表示</button>
    </div>
  </div>
</div>

<div class="flex-row">
  <div style="flex:2;">
    <h2>検索結果</h2>
    <div id="result"></div>
  </div>
  <div style="flex:1;">
    <h3>デッキ状況</h3>
    <div id="deckStatus"></div>
  </div>
</div>

<hr>

<div id="deckContainer" class="white-mode">
  <div id="deckImages"></div>
  <div id="territoryImage"></div>
</div>

<button onclick="checkDeckRules()">完成チェック</button>
<button onclick="toggleBackground()">on/off</button>
<button onclick="exportDeckImage()">デッキ画像を作成</button>
<div id="deckCheckResult"></div>
<div id="deckImageResult"></div>

<h2>デッキコード</h2>
<textarea id="deckCodeBox" placeholder="ここにデッキコードを入力"></textarea><br>
<button onclick="generateDeckCode()">デッキコード生成</button>
<button onclick="loadDeckFromCode()">デッキ復元</button>
<button onclick="copyDeckCode()">コピー</button>
<div id="deckCodeResult"></div>

</div>

<!-- デッキレシピ投稿タブ -->
<div id="recipe" class="tab-content">
<h2>デッキレシピ投稿</h2>
<form>
  <label>タイトル:<br><input type="text" name="title" style="width:100%"></label><br><br>
  <label>説明:<br><textarea name="description" style="width:100%; height:100px;"></textarea></label><br><br>
  <label>デッキコード:<br><textarea name="deckCode" style="width:100%; height:60px;" placeholder="デッキコードを入力"></textarea></label><br><br>
  <div id="recipeDeckImage"></div>
  <button type="button" onclick="alert('投稿リンク生成機能は後で追加')">Twitterに投稿</button>
</form>
</div>

<!-- カード一覧タブ -->
<div id="allcards" class="tab-content">
<h2>カード一覧</h2>
<div class="card-list" id="allCardList"></div>
</div>

<script src="data/cards.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
// タブ切り替え
function openTab(tabId){
  document.querySelectorAll('.tab').forEach(btn => btn.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
  document.querySelector(`[onclick="openTab('${tabId}')"]`).classList.add('active');
  document.getElementById(tabId).classList.add('active');
}

// デッキ管理関連
let deck = [];
let territoryCard = null;

// カード一覧に表示
function showAllCards(){
  const listDiv = document.getElementById('allCardList');
  listDiv.innerHTML = '';
  cards.forEach(c=>{
    const img = document.createElement('img');
    img.src = c.image;
    img.title = `${c.id} ${c.name}`;
    img.onclick = ()=>{ addToDeck(c.name); };
    listDiv.appendChild(img);
  });
}

// デッキ操作
function addToDeck(name){
  const card = cards.find(c=>c.name===name);
  if(!card) return;
  if(card.type==='territory'){ territoryCard = card; updateDeckImages(); return; }
  const count = {};
  deck.forEach(n=>{ count[n] = (count[n]||0)+1; });
  if(count[name]>=4){ alert("同名カードは4枚までです"); return; }
  deck.push(name);
  updateDeckImages();
}

function removeFromDeck(name){
  const idx = deck.indexOf(name);
  if(idx>=0){ deck.splice(idx,1); updateDeckImages(); }
}

function updateDeckImages(){
  const container = document.getElementById('deckImages');
  container.innerHTML = '';
  deck.forEach(n=>{
    const card = cards.find(c=>c.name===n);
    if(!card) return;
    const img = document.createElement('img');
    img.src = card.image;
    img.title = card.name;
    img.onclick = ()=>removeFromDeck(n);
    container.appendChild(img);
  });
  const territoryDiv = document.getElementById('territoryImage');
  territoryDiv.innerHTML = '';
  if(territoryCard){
    const img = document.createElement('img');
    img.src = territoryCard.image;
    img.title = territoryCard.name;
    territoryDiv.appendChild(img);
  }
  updateDeckStatus();
}

function updateDeckStatus(){
  const statusDiv = document.getElementById('deckStatus');
  statusDiv.innerHTML = `ユニット: ${deck.length} 枚<br>テリトリー: ${territoryCard?1:0} 枚`;
}

// 完成チェック
function checkDeckRules(){
  let msg='';
  if(deck.length>40) msg+="ユニットが多すぎます<br>";
  if(territoryCard && deck.length>0) msg+="テリトリーカードとユニットの枚数確認<br>";
  document.getElementById('deckCheckResult').innerHTML = msg||"デッキルールOK";
}

// デッキコード系
function generateDeckCode(){ document.getElementById('deckCodeBox').value = JSON.stringify({deck,territory:territoryCard?territoryCard.name:null}); }
function loadDeckFromCode(){ 
  try{
    const obj = JSON.parse(document.getElementById('deckCodeBox').value);
    deck = obj.deck||[]; 
    territoryCard = cards.find(c=>c.name===obj.territory)||null;
    updateDeckImages();
  }catch(e){alert("無効なデッキコード")}
}
function copyDeckCode(){ navigator.clipboard.writeText(document.getElementById('deckCodeBox').value); }

// 背景切替
function toggleBackground(){
  const deckC = document.getElementById('deckContainer');
  deckC.classList.toggle('mat-mode');
  deckC.classList.toggle('white-mode');
}

// デッキ画像生成
function exportDeckImage(){
  html2canvas(document.getElementById('deckContainer')).then(canvas=>{
    const div = document.getElementById('deckImageResult');
    div.innerHTML=''; div.appendChild(canvas);
  });
}

// 検索
function search(){
  const res = document.getElementById('result');
  res.innerHTML='';
  const nameFilter = document.getElementById('searchBox').value;
  const effectFilter = document.getElementById('effectSearchBox').value;
  const typeF = document.getElementById('typeFilter').value;
  const colorF = document.getElementById('colorFilter').value;
  const genF = document.getElementById('generationFilter').value;
  const subF = document.getElementById('subTypeFilter').value;
  const rarityF = document.getElementById('rarityFilter').value;
  const costMin = parseInt(document.getElementById('costMin').value)||0;
  const costMax = parseInt(document.getElementById('costMax').value)||100;
  const powerMin = parseInt(document.getElementById('powerMin').value)||0;
  const powerMax = parseInt(document.getElementById('powerMax').value)||10000;
  const hitMin = parseInt(document.getElementById('hitMin').value)||0;
  const hitMax = parseInt(document.getElementById('hitMax').value)||100;

  const filtered = cards.filter(c=>{
    return (!nameFilter || c.name.includes(nameFilter)) &&
           (!effectFilter || c.effect.includes(effectFilter)) &&
           (!typeF || c.type===typeF) &&
           (!colorF || c.color===colorF) &&
           (!genF || c.generation===genF) &&
           (!subF || c.subType===subF) &&
           (!rarityF || c.rarity===rarityF) &&
           (c.cost>=costMin && c.cost<=costMax) &&
           (c.power>=powerMin && c.power<=powerMax) &&
           (c.hit>=hitMin && c.hit<=hitMax);
  });
  filtered.forEach(c=>{
    const div = document.createElement('div');
    div.className = `card-${c.color.toLowerCase()}`;
    div.innerHTML = `<b>${c.name}</b><br><img src="${c.image}" width="98" height="140">`;
    div.onclick = ()=>addToDeck(c.name);
    res.appendChild(div);
  });
}

// ランダムカード
function rerollDailyCard(){
  const c = cards[Math.floor(Math.random()*cards.length)];
  showCardInDaily(c);
}
function showManualCard(){
  const id = document.getElementById('manualCardId').value;
  const c = cards.find(c=>c.id==id);
  if(c) showCardInDaily(c);
}
function showCardInDaily(c){
  const div = document.getElementById('dailyCard');
  div.innerHTML = `<b>${c.name}</b><br><img src="${c.image}" width="98" height="140">`;
}

// 初期化
showAllCards();
rerollDailyCard();
</script>
</body>
</html>
