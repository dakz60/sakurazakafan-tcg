<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>櫻坂TCG◢ ファンサイト</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1>櫻坂TCG◢ ファンサイト</h1>

<!-- タブ -->
<div>
  <button class="tab active" onclick="openTab('deck', this)">デッキ作成</button>
  <button class="tab" onclick="openTab('collection', this)">コレクション</button>
  <button class="tab" onclick="openTab('allcards', this)">カード一覧</button>
  <button class="tab" onclick="openTab('trade', this)">トレード</button>
  <button class="tab" onclick="openTab('board', this)">掲示板</button>
</div>

<!-- デッキ作成タブ -->
<div id="deck" class="tab-content active">
  <h2>デッキ作成</h2>
  <div id="releaseCountdown"></div>

  <div class="flex-row">
    <div style="flex:2;" class="flex-col">
      <!-- 検索条件 -->
      <div class="search-section">
        <label>コスト：<input type="number" id="costMin" placeholder="最小"> 〜 <input type="number" id="costMax" placeholder="最大"></label>
        <label>パワー：<input type="number" id="powerMin" placeholder="最小"> 〜 <input type="number" id="powerMax" placeholder="最大"></label>
        <label>ヒット：<input type="number" id="hitMin" placeholder="最小"> 〜 <input type="number" id="hitMax" placeholder="最大"></label>
      </div>

      <div class="search-section">
        <label>タイプ：
          <select id="typeFilter">
            <option value="">すべて</option>
            <option value="unit">ユニット</option>
            <option value="ace">エース</option>
            <option value="command">コマンド</option>
            <option value="territory">テリトリー</option>
          </select>
        </label>
        <label>色：
          <select id="colorFilter">
            <option value="">すべて</option>
            <option value="白">白</option>
            <option value="赤">赤</option>
            <option value="青">青</option>
            <option value="黒">黒</option>
          </select>
        </label>
        <label>スート：
          <select id="suitFilter">
            <option value="">すべて</option>
            <option value="♡">♡</option>
            <option value="♢">♢</option>
            <option value="♤">♤</option>
            <option value="♧">♧</option>
          </select>
        </label>
        <label>期別：
          <select id="generationFilter">
            <option value="">すべて</option>
            <option value="2期">2期</option>
            <option value="3期">3期</option>
            <option value="4期">4期</option>
          </select>
        </label>
        <label>トリガー：
          <select id="subTypeFilter">
            <option value="">すべて</option>
            <option value="バスター">バスター</option>
            <option value="ショット">ショット</option>
            <option value="その他">その他</option>
          </select>
        </label>
        <label>キーワード：
          <select id="keyWordFilter">
            <option value="">すべて</option>
            <option value="ブライト">ブライト</option>
            <option value="ブリッツ">ブリッツ</option>
            <option value="パワー">パワー</option>
            <option value="デコイ">デコイ</option>
            <option value="バーサーク">バーサーク</option>
            <option value="スカウト">スカウト</option>
            <option value="スカウト2">スカウト2</option>
            <option value="ヒット">ヒット</option>
            <option value="回復">回復</option>
            <option value="登場時">登場時</option>
            <option value="ドロップ時">ドロップ時</option>
          </select>
        </label>
        <label>レアリティ：
          <select id="rarityFilter">
            <option value="">すべて</option>
            <option value="PRT">PRT</option>
            <option value="PRY">PRY</option>
            <option value="BT">BT</option>
            <option value="R">R</option>
            <option value="R+">R+</option>
            <option value="SC">SC</option>
            <option value="N">N</option>
            <option value="N+">N+</option>
          </select>
        </label>
        <label>カードID：
          <input type="text" id="cardIdSearchBox" placeholder="IDで検索">
        </label>
      </div>

      <div class="search-section">
        <label>カード名検索：
          <input type="text" id="searchBox" placeholder="カード名を入力" list="cardList">
          <datalist id="cardList"></datalist>
        </label>
        <label>効果検索：
          <input type="text" id="effectSearchBox" placeholder="効果で検索">
        </label>
        <button onclick="search()">検索</button>
      </div>
    </div>

    <!-- ランダムカード表示 -->
    <div style="flex:1; border:2px solid rgb(241,157,181); border-radius:80px; padding:40px;">
      <h3 style="text-align:center;">🌸ランダムカード🌸</h3>
      <div id="dailyCard"></div>
      <div style="text-align:center; margin-top:10px;">
        <button onclick="rerollDailyCard()" style="font-size:16px; border-radius:20px; cursor:pointer;">🌸</button>
        <input type="text" id="manualCardId" placeholder="カードID" style="width:66px;">
        <button onclick="showManualCard()">表示</button>
      </div>
    </div>
  </div>

  <!-- 検索結果＆デッキ状況 -->
  <div class="flex-row">
    <div style="flex:2;">
      <h2>検索結果</h2>
      <div id="result"></div>
    </div>
    <div style="flex:1;">
      <h3>デッキ状況</h3>
      <div id="deckStatus"></div>
    </div>
  </div>

  <hr>

  <div id="deckContainer" class="white-mode">
    <div id="deckImages"></div>
    <div id="territoryImage"></div>
  </div>

  <button onclick="checkDeckRules()">完成チェック</button>
  <button onclick="toggleBackground()">on/off</button>
  <div id="deckCheckResult"></div>

  <h2>デッキコード</h2>
  <textarea id="deckCodeBox" placeholder="ここにデッキコードを入力"></textarea><br>
  <button onclick="generateDeckCode()">デッキコード生成</button>
  <button onclick="loadDeckFromCode()">デッキ復元</button>
  <button onclick="copyDeckCode()">コピー</button>
  <div id="deckCodeResult"></div>
</div>

<div id="collection" class="tab-content">
  <h2>コレクション</h2>
  <div class="search-section">
    <label>所持状況：
      <select id="ownershipFilter" onchange="showCollection()">
        <option value="all">全て</option>
        <option value="owned">所持</option>
        <option value="unowned">未所持</option>
      </select>
    </label>
  </div>

  <div id="collectionList"></div>
</div>

<!-- 全カード一覧タブ -->
<div id="allcards" class="tab-content">
  <h2>カード一覧</h2>
  <div id="cardListAll"></div>
</div>
  
<!-- トレード -->
<div id="trade" class="tab-content">
  <h2>トレード</h2>

  <label>譲：
    <input type="text" id="tradeGive">
  </label>

  <label>求：
    <input type="text" id="tradeWant">
  </label>
<br>
  
  <label>方法：</label>
  <div>
    <label><input type="checkbox" name="tradeMethod" value="会場手渡し">会場手渡し</label>
    <label><input type="checkbox" name="tradeMethod" value="都内手渡し">都内手渡し</label>
    <label><input type="checkbox" name="tradeMethod" value="郵送">郵送</label>
  </div>
<br>
  
  <label>場所：</label>
  <div>
    <label><input type="checkbox" name="tradePlace" value="京都リアミ">京都リアミ</label>
    <label><input type="checkbox" name="tradePlace" value="幕張リアミ">幕張リアミ</label>
    <label><input type="checkbox" name="tradePlace" value="バクラ">バクラ</label>
    <label><input type="checkbox" name="tradePlace" value="ツアー静岡">ツアー静岡</label>
    <label><input type="checkbox" name="tradePlace" value="ツアー兵庫">ツアー兵庫</label>
    <label><input type="checkbox" name="tradePlace" value="ツアー広島">ツアー広島</label>
    <label><input type="checkbox" name="tradePlace" value="ツアー千葉">ツアー千葉</label>
    <label><input type="checkbox" name="tradePlace" value="ツアー宮城">ツアー宮城</label>
    <label><input type="checkbox" name="tradePlace" value="ツアー香川">ツアー香川</label>
  </div>
<br>
  
  <!-- 推しメン（複数選択） -->
  <label>推しメン：</label>
  <div>
    <label><input type="checkbox" name="tradeOshi" value="井上梨名">井上梨名</label>
    <label><input type="checkbox" name="tradeOshi" value="遠藤光莉">遠藤光莉</label>
    <label><input type="checkbox" name="tradeOshi" value="大園玲">大園玲</label>
    <label><input type="checkbox" name="tradeOshi" value="大沼晶保">大沼晶保</label>
    <label><input type="checkbox" name="tradeOshi" value="幸阪茉里乃">幸阪茉里乃</label>
    <label><input type="checkbox" name="tradeOshi" value="武元唯衣">武元唯衣</label>
    <label><input type="checkbox" name="tradeOshi" value="田村保乃">田村保乃</label>
    <label><input type="checkbox" name="tradeOshi" value="藤吉夏鈴">藤吉夏鈴</label>
    <label><input type="checkbox" name="tradeOshi" value="増本綺良">増本綺良</label>
    <label><input type="checkbox" name="tradeOshi" value="松田里奈">松田里奈</label>
    <label><input type="checkbox" name="tradeOshi" value="森田ひかる">森田ひかる</label>
    <label><input type="checkbox" name="tradeOshi" value="守屋麗奈">守屋麗奈</label>
    <label><input type="checkbox" name="tradeOshi" value="山崎天">山﨑天</label>
    <label><input type="checkbox" name="tradeOshi" value="石森璃花">石森璃花</label>
    <label><input type="checkbox" name="tradeOshi" value="遠藤理子">遠藤理子</label>
    <label><input type="checkbox" name="tradeOshi" value="小田倉麗奈">小田倉麗奈</label>
    <label><input type="checkbox" name="tradeOshi" value="小島凪沙">小島凪沙</label>
    <label><input type="checkbox" name="tradeOshi" value="谷口愛季">谷口愛季</label>
    <label><input type="checkbox" name="tradeOshi" value="中嶋優月">中嶋優月</label>
    <label><input type="checkbox" name="tradeOshi" value="的野美青">的野美青</label>
    <label><input type="checkbox" name="tradeOshi" value="向井純葉">向井純葉</label>
    <label><input type="checkbox" name="tradeOshi" value="村井優">村井優</label>
    <label><input type="checkbox" name="tradeOshi" value="村山美羽">村山美羽</label>
    <label><input type="checkbox" name="tradeOshi" value="山下瞳月">山下瞳月</label>
    <label><input type="checkbox" name="tradeOshi" value="浅井恋乃未">浅井恋乃未</label>
    <label><input type="checkbox" name="tradeOshi" value="稲熊ひな">稲熊ひな</label>
    <label><input type="checkbox" name="tradeOshi" value="勝又春">勝又春</label>
    <label><input type="checkbox" name="tradeOshi" value="佐藤愛桜">佐藤愛桜</label>
    <label><input type="checkbox" name="tradeOshi" value="中川智尋">中川智尋</label>
    <label><input type="checkbox" name="tradeOshi" value="松本和子">松本和子</label>
    <label><input type="checkbox" name="tradeOshi" value="目黒陽色">目黒陽色</label>
    <label><input type="checkbox" name="tradeOshi" value="山川宇井">山川宇井</label>
    <label><input type="checkbox" name="tradeOshi" value="山田桃実">山田桃実</label>
  

  </div>

  <button onclick="postTrade()">投稿</button>
</div>

<!-- JS読み込み -->
<script src="data/cards.js"></script>
<script src="data/board.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
<script src="js/memberColors.js"></script>
<script src="js/main.js"></script>

</body>
</html>
