<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>櫻坂TCG◢ デッキ構築＆レシピ投稿</title>
<style>
body { font-family: sans-serif; background: white; color: rgb(241,157,181); margin: 0; padding: 0; }
h1 { text-align: center; padding: 20px; }
.tab-header { display: flex; justify-content: center; gap: 20px; margin-bottom: 10px; }
.tab-header button { padding: 10px 20px; border: 1px solid rgb(241,157,181); border-radius: 5px; background: white; color: rgb(241,157,181); cursor: pointer; }
.tab-header button.active { background: rgb(241,157,181); color: white; }
.tab-content { display: none; padding: 20px; }
.tab-content.active { display: block; }
</style>
</head>
<body>

<h1>櫻坂TCG◢ デッキ構築＆レシピ投稿</h1>

<div class="tab-header">
  <button class="tab-btn active" data-tab="deck-builder">デッキ作成</button>
  <button class="tab-btn" data-tab="deck-recipe">デッキレシピ投稿</button>
</div>

<div id="deck-builder" class="tab-content active">
  <!-- ここに今のデッキ作成 UI をそのまま入れる -->
  <p>デッキ作成UIをここに移植</p>
</div>

<div id="deck-recipe" class="tab-content">
  <!-- デッキレシピ投稿フォーム -->
  <h2>デッキレシピ投稿</h2>
  <label>投稿者名：<input type="text" id="recipeAuthor"></label><br>
  <label>デッキタイトル：<input type="text" id="recipeTitle"></label><br>
  <label>コメント：<textarea id="recipeComment"></textarea></label><br>
  <label>デッキコード：<input type="text" id="recipeCode"></label><br>
  <button onclick="submitRecipe()">投稿</button>

  <h3>投稿一覧</h3>
  <div id="recipeList"></div>
</div>

<script>
// タブ切替
const tabs = document.querySelectorAll('.tab-btn');
tabs.forEach(btn => {
  btn.addEventListener('click', () => {
    tabs.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
    document.getElementById(btn.dataset.tab).classList.add('active');
  });
});

// 投稿処理
function submitRecipe(){
  const author = document.getElementById('recipeAuthor').value.trim();
  const title = document.getElementById('recipeTitle').value.trim();
  const comment = document.getElementById('recipeComment').value.trim();
  const code = document.getElementById('recipeCode').value.trim();
  if(!author || !title || !code){ alert('名前・タイトル・デッキコードは必須です'); return; }

  const recipe = {author, title, comment, code};
  const recipes = JSON.parse(localStorage.getItem('recipes') || '[]');
  recipes.push(recipe);
  localStorage.setItem('recipes', JSON.stringify(recipes));
  renderRecipes();
}

// 投稿一覧表示
function renderRecipes(){
  const recipes = JSON.parse(localStorage.getItem('recipes') || '[]');
  const list = document.getElementById('recipeList');
  list.innerHTML = '';
  recipes.forEach((r,i)=>{
    const div = document.createElement('div');
    div.style.border = '1px solid rgb(241,157,181)';
    div.style.padding = '10px';
    div.style.margin = '10px 0';
    div.innerHTML = `
      <strong>${r.title}</strong> by ${r.author}<br>
      ${r.comment ? r.comment + '<br>' : ''}
      デッキコード: ${r.code}<br>
      <button onclick="tweetRecipe(${i})">Twitterで投稿</button>
    `;
    list.appendChild(div);
  });
}

// Twitter 投稿
function tweetRecipe(index){
  const recipes = JSON.parse(localStorage.getItem('recipes') || '[]');
  const r = recipes[index];
  const text = encodeURIComponent(`${r.title} by ${r.author}\n${r.comment}\nデッキコード:${r.code}`);
  window.open(`https://twitter.com/intent/tweet?text=${text}`, '_blank');
}

// 初回表示
renderRecipes();
</script>

</body>
</html>
